##############################################################################
#  Step 2 — Add Data Analytics: Incident Analysis
#
#  Keep the Safety Protocol Advisor from Step 1 and add an AnalyticsAgent
#  that can query incident and safety protocol data using PandasExecutor.
#  The orchestrator routes queries to the right agent automatically.
#
#  Try: "Show me the top 5 incident types this quarter with severity breakdown"
#  Try: "What PPE is required for Cat 320 excavator operations?"
##############################################################################

orchestrator:
  agent_list:
    - agent_name: "Safety Protocol Advisor"
    - agent_name: "Incident Analyst"
  enable_routing: true

utility_agents:
  - agent_class: UtilityAgent
    agent_name: "Safety Protocol Advisor"
    agent_description: |
      Caterpillar heavy equipment safety expert. Answers questions about
      safe operating procedures, required PPE, pre-operation checks,
      emergency procedures, and applicable OSHA/MSHA regulations for
      all Cat equipment models.
    config:
      magic_prompt: |
        You are a senior Caterpillar safety engineer with 20 years of experience
        in heavy construction equipment safety. You have deep knowledge of:
        - Equipment-specific hazards for all Cat models (excavators, dozers,
          loaders, articulated trucks, motor graders, compactors, drills)
        - Required PPE for every operation type and risk level
        - Pre-operation safety checks and inspection procedures
        - Emergency response procedures for equipment incidents
        - OSHA (1926 series for construction, 1910 for general industry),
          MSHA (30 CFR 56), and EPA regulations

        Always provide specific, actionable safety guidance. Reference applicable
        regulatory codes (e.g., OSHA 1926.1428 for cranes/excavators, OSHA 1926.502
        for fall protection, MSHA 30 CFR 56.9100 for haulage). When discussing PPE,
        specify exact types and ratings (e.g., "ANSI Class 2 high-vis vest",
        "NRR 25+ earplugs"). Prioritize worker safety above all else.

  - agent_class: AnalyticsAgent
    agent_name: "Incident Analyst"
    agent_description: |
      Analyzes safety incident data. For trend queries, use groupby.
      For similar incident lookups, return individual rows using queries like:
      default_incidents[default_incidents['machine_model'].str.contains('320')].head(5)
      Include all columns: incident_id, date, site, machine_model,
      incident_type, severity, description, root_cause, corrective_action.
    config:
      executor_config:
        type: PandasExecutor
        tables:
          - name: incidents
            file_path: data/incident_log.csv
            description: |
              Safety incident records. Variable name: default_incidents
              Columns: incident_id, date (YYYY-MM-DD), site, machine_model,
              incident_type, severity (Critical/High/Medium/Low), description,
              root_cause, corrective_action, injuries (int), lost_work_days (int)
          - name: protocols
            file_path: data/safety_protocols.csv
            description: |
              Equipment safety protocols. Variable name: default_protocols
              Columns: protocol_id, category, applicable_models, hazard,
              risk_level (Critical/High/Medium/Low), pre_operation_checks,
              operating_procedure, ppe_required, emergency_procedure, regulatory_ref
