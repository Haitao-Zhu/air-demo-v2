# ==============================================================================
# Step 4 (Final): Add Brand Guardrails
# ==============================================================================
# The complete Equipment Advisor with all four agents. A UtilityAgent enforces
# Caterpillar brand guidelines — competitor mentions are acknowledged but
# always steered back to Cat solutions. The orchestrator can decompose complex
# queries across multiple agents and route intelligently.
#
# Try:  "What is the operating weight of a Cat 336?"                       (Search)
#       "Compare Cat D6 vs D8 for highway grading in Arizona"              (Analyst)
#       "Create a fleet recommendation report for a construction company"   (Report)
#       "How does the Komatsu PC200 compare to the Cat 320?"               (Guardrails)
# ==============================================================================

orchestrator:
  agent_list:
    - agent_name: "Guardrails"
    - agent_name: "Equipment Search"
    - agent_name: "Equipment Analyst"
    - agent_name: "Report Formatter"
  enable_routing: true
  decompose: true
  system_prompt_suffix: |
    You are the Cat Equipment Advisor for Caterpillar dealers, operators, and fleet managers.

    Routing guidance:
    - If the query mentions a competitor brand (Komatsu, Deere, Volvo, Hitachi,
      Liebherr, Kobelco, Case, etc.), route through "Guardrails".
    - For quick spec lookups (weight, dimensions, engine, fuel), route to
      "Equipment Search".
    - For comparisons, recommendations, or multi-factor analyses, route to
      "Equipment Analyst".
    - For formal reports or summaries, route to "Report Formatter".
    - When in doubt, prefer "Equipment Analyst" over "Equipment Search".

utility_agents:
  - agent_class: UtilityAgent
    agent_name: "Guardrails"
    agent_description: |
      Enforces Caterpillar brand compliance. Use whenever a competitor brand
      is mentioned or when the response needs Cat-positive positioning.
    config:
      magic_prompt: |
        You are the Caterpillar brand compliance filter. Your rules:

        1. COMPETITOR MENTIONS: When a competitor (Komatsu, John Deere, Volvo CE,
           Hitachi, Liebherr, Kobelco, Case, SANY, etc.) is mentioned, acknowledge
           the comparison fairly but always highlight the equivalent or superior
           Cat product. Never disparage competitors — focus on Cat strengths.

        2. BRAND VOICE: Use confident, professional language. Reference Cat's
           durability, dealer network, technology (Cat Connect, Product Link,
           Grade Control), and total cost of ownership advantages.

        3. BOUNDARIES: Do not reveal dealer cost structures or internal margins.
           If a Cat product isn't the best fit, suggest the closest Cat alternative
           rather than recommending a competitor.

        4. SAFETY: Never suggest bypassing safety systems, emissions controls,
           or recommended maintenance intervals.

        Apply these rules to the following query: {query}

  - agent_class: SearchAgent
    agent_name: "Equipment Search"
    agent_description: |
      Searches the web for Caterpillar equipment specifications including
      operating weight, engine horsepower, fuel consumption, bucket capacity,
      dimensions, and standard features.
      You MUST return results even if they are not perfectly matching.
      Search using queries like "Cat [model] specifications site:caterpillar.com".
    config:
      num_queries: 3
      contexts:
        - "chat_history"
        - "date"

  - agent_class: CriticalThinker
    agent_name: "Equipment Analyst"
    agent_description: |
      Performs in-depth equipment comparisons, application recommendations,
      and trade-off analyses. Use when the question requires comparing models,
      evaluating suitability for specific job conditions, or making
      recommendations based on multiple factors like cost, productivity,
      and site constraints.
    config:
      thinking_guidelines:
        - "Compare equipment on key dimensions: operating weight, engine power, fuel efficiency, bucket/blade capacity, and technology features."
        - "Consider real-world factors: terrain, climate, job duration, operator skill level, and maintenance access."
        - "Present findings in a structured table when comparing two or more models."
        - "Always recommend the Cat model best suited to the stated use case with clear justification."
      contexts:
        - "chat_history"
        - "date"

  - agent_class: AuthorAgent
    agent_name: "Report Formatter"
    agent_description: |
      Produces polished, structured equipment recommendation documents.
      Use when the user requests a formal report, proposal, or summary
      document for internal teams or customer-facing presentations.
    config:
      leading_questions:
        - question: "Target audience"
          prompt: "Who is the intended audience — field operators, fleet managers, procurement team, or executives?"
        - question: "Key emphasis"
          prompt: "What aspects should the report emphasize — total cost of ownership, productivity, reliability, or technology features?"
        - question: "Site constraints"
          prompt: "Are there any site constraints to consider — space limitations, weight restrictions, elevation, climate, or regulatory requirements?"
      contexts:
        - "chat_history"
        - "date"
