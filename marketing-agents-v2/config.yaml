memory_config:
  memory_modules:
    - memory_name: chat_history
      memory_class: ChatMemoryModule
      kwargs:
        n_rounds: 10

    - memory_name: chat_history_memtree
      memory_class: MemTreeModule
      kwargs:
        auto_add: true
        top: 5
        threshold: 0.05
        max_context: 1500

orchestrator:
  agent_list:
    - agent_name: "Marketing Campaign Generator"
  decompose: false

super_agents:
  - agent_class: FlowSuperAgent
    agent_name: "Marketing Campaign Generator"
    agent_description: |
      A specialist that researches a topic using web, academic, and news searches,
      develops a marketing strategy, writes a polished report, and saves it to a
      markdown file.
    config:
      goal: "Research a user-specified topic using web, academic, and news sources, develop a marketing strategy, write a compelling report, and save it to the filesystem as a markdown file."
      agent_list:
        - agent_name: "Web Searcher"
          next_step:
            - "Marketing Strategist"

        - agent_name: "Paper Searcher"
          next_step:
            - "Marketing Strategist"

        - agent_name: "News Searcher"
          next_step:
            - "Marketing Strategist"

        - agent_name: "Marketing Strategist"
          next_step:
            - "Report Writer"

        - agent_name: "Report Writer"
          next_step:
            - "Filesystem Agent"

        - agent_name: "Filesystem Agent"

utility_agents:
  # MCPClientAgent for DuckDuckGo web search
  - agent_class: MCPClientAgent
    agent_name: "Web Searcher"
    agent_description: "Performs web searches using DuckDuckGo to gather current information and general context on a topic."
    config:
      mcpServers:
        duckduckgo:
          url: "http://localhost:4003/mcp"
          type: "http-stream"
      enable_interpreter: false
      wait_time: 300
      contexts:
        - "chat_history"

  # MCPClientAgent for arXiv academic paper search
  - agent_class: MCPClientAgent
    agent_name: "Paper Searcher"
    agent_description: "Searches the arXiv repository for academic papers, pre-prints, and research relevant to a topic. Only send AI/LLM related queries to this agent and keep it broad."
    config:
      mcp_sse_url: "http://localhost:4001/sse"
      enable_interpreter: false
      wait_time: 300
      contexts:
        - "date"
        - "chat_history"

  # SearchAgent for news (replaces AzureAIAgent)
  - agent_class: SearchAgent
    agent_name: "News Searcher"
    agent_description: "Searches the web for the latest news, articles, and trends on a given topic. Focuses on recent developments and industry news."

  # PlanningAgent for marketing strategy (replaces AzureAIAgent)
  - agent_class: PlanningAgent
    agent_name: "Marketing Strategist"
    agent_description: |
      A specialist in developing comprehensive, data-driven marketing funnels.
      Analyzes research findings to define target audience personas, establishes
      key performance indicators (KPIs), and outlines a multi-channel strategy
      encompassing awareness, consideration, and conversion stages.

  # AuthorAgent for report writing (replaces AzureAIAgent)
  - agent_class: AuthorAgent
    agent_name: "Report Writer"
    agent_description: |
      Writes a polished, detailed markdown report from the marketing strategy.
      Produces a professional document with executive summary, personas, funnel
      overview, multi-channel strategy, content calendar, and next steps.
    config:
      memory_attribute_key: "marketing_report"
      leading_questions:
        - question: "Executive Summary"
          prompt: "Provide a concise executive summary of the marketing campaign including target market and key objectives"
        - question: "Target Personas"
          prompt: "Define the target audience personas with demographics, pain points, and motivations"
        - question: "Multi-Channel Strategy"
          prompt: "Outline the marketing funnel strategy across awareness, consideration, and conversion stages"
        - question: "Content Calendar and Next Steps"
          prompt: "Propose a content calendar with key milestones, KPIs, and recommended next steps"

  # MCPClientAgent for saving the report to a local file
  - agent_class: MCPClientAgent
    agent_name: "Filesystem Agent"
    agent_description: "Saves content to a local markdown file. No need to specify the path, file type, or content."
    config:
      mcp_sse_url: "http://localhost:4004/sse"
      wait_time: 260
      enable_interpreter: false
      magic_prompt: |
        Your task is to save the marketing campaign report generated by the 'Report Writer' from the chat history into a local file named marketing_report_YYYY-MM-DD.md.

        Instructions:
        1. Find the report content from the chat history.
        2. Use the writeFile tool.
        3. Set the path parameter to ./marketing_report_YYYY-MM-DD.md, using today's date.
        4. Set the content parameter to the full text of the report.
        5. Execute the tool call.
      contexts:
        - "chat_history"
        - "date"
